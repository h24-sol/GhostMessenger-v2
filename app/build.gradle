plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ghost.vault'
    compileSdk 33

    defaultConfig {
        applicationId "com.ghost.vault"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-nearby:19.0.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
